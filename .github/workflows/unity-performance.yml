name: Unity Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  performance:
    name: Unity 2022.3 EditMode Performance
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: TestProject/Library
          key: Library-${{ runner.os }}-2022.3-${{ hashFiles('package.json', 'Runtime/**', 'Tests/**') }}
          restore-keys: |
            Library-${{ runner.os }}-2022.3-

      - name: Unity license notice
        if: ${{ env.UNITY_LICENSE == '' && env.UNITY_SERIAL == '' }}
        run: |
          echo "::notice::Unity performance tests are configured but skipped because UNITY_LICENSE or UNITY_SERIAL is not set."

      - name: Run EditMode tests
        if: ${{ env.UNITY_LICENSE != '' || env.UNITY_SERIAL != '' }}
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: TestProject
          unityVersion: 2022.3.62f1
          testMode: EditMode
          customParameters: -testResults artifacts/editmode-results.xml

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-performance-results
          path: artifacts
