name: Unity Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  performance:
    name: Unity 2022.3 EditMode Performance
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create isolated performance project
        shell: bash
        run: |
          rm -rf .perf
          mkdir -p .perf/Task233Package .perf/TestProject/Assets .perf/TestProject/Packages .perf/TestProject/ProjectSettings
          cp -R Runtime Editor Tests Documentation~ package.json README.md LICENSE CHANGELOG.md .perf/Task233Package/
          cat > .perf/TestProject/Packages/manifest.json <<'JSON'
          {
            "dependencies": {
              "com.neko233.task233": "file:../../Task233Package",
              "com.cysharp.unitask": "https://github.com/Cysharp/UniTask.git?path=src/UniTask/Assets/Plugins/UniTask#2.5.11",
              "com.unity.test-framework": "1.1.33",
              "com.unity.test-framework.performance": "3.0.3"
            }
          }
          JSON
          cat > .perf/TestProject/ProjectSettings/ProjectVersion.txt <<'TXT'
          m_EditorVersion: 2022.3.51f1
          m_EditorVersionWithRevision: 2022.3.51f1
          TXT

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: .perf/TestProject/Library
          key: Library-${{ runner.os }}-2022.3.51f1-${{ hashFiles('package.json', 'Runtime/**', 'Tests/**') }}
          restore-keys: |
            Library-${{ runner.os }}-2022.3.51f1-

      - name: Unity license notice
        if: ${{ env.UNITY_LICENSE == '' && env.UNITY_SERIAL == '' }}
        run: |
          echo "::notice::Unity performance tests are configured but skipped because UNITY_LICENSE or UNITY_SERIAL is not set."

      - name: Run EditMode tests
        if: ${{ env.UNITY_LICENSE != '' || env.UNITY_SERIAL != '' }}
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: .perf/TestProject
          unityVersion: 2022.3.51f1
          testMode: EditMode
          customParameters: -testResults artifacts/editmode-results.xml

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-performance-results
          path: artifacts
